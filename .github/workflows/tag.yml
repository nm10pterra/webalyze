name: Tag Manager

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Semver bump type"
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
          - custom
      custom_tag:
        description: "Custom tag (example: v1.2.3). Used only when bump=custom."
        required: false
        type: string

permissions:
  contents: write

jobs:
  create-tag:
    name: Create and push tag
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.tag.outputs.new_tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Compute next tag
        id: tag
        env:
          INPUT_BUMP: ${{ github.event.inputs.bump }}
          INPUT_CUSTOM_TAG: ${{ github.event.inputs.custom_tag }}
        run: |
          set -euo pipefail

          latest_tag="$(git tag -l 'v*' --sort=-v:refname | head -n 1)"
          if [ -z "${latest_tag}" ]; then
            latest_tag="v0.0.0"
          fi

          case "${INPUT_BUMP}" in
            custom)
              if [ -z "${INPUT_CUSTOM_TAG}" ]; then
                echo "custom_tag is required when bump=custom"
                exit 1
              fi
              new_tag="${INPUT_CUSTOM_TAG}"
              ;;
            patch|minor|major)
              version="${latest_tag#v}"
              IFS='.' read -r major minor patch <<<"${version}"
              major="${major:-0}"
              minor="${minor:-0}"
              patch="${patch:-0}"

              case "${INPUT_BUMP}" in
                patch)
                  patch=$((patch + 1))
                  ;;
                minor)
                  minor=$((minor + 1))
                  patch=0
                  ;;
                major)
                  major=$((major + 1))
                  minor=0
                  patch=0
                  ;;
              esac

              new_tag="v${major}.${minor}.${patch}"
              ;;
            *)
              echo "unsupported bump type: ${INPUT_BUMP}"
              exit 1
              ;;
          esac

          if ! [[ "${new_tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "tag must follow semver format v<major>.<minor>.<patch>, got: ${new_tag}"
            exit 1
          fi

          if git rev-parse "${new_tag}" >/dev/null 2>&1; then
            echo "tag already exists: ${new_tag}"
            exit 1
          fi

          echo "latest_tag=${latest_tag}" >> "${GITHUB_OUTPUT}"
          echo "new_tag=${new_tag}" >> "${GITHUB_OUTPUT}"

      - name: Create and push tag
        env:
          NEW_TAG: ${{ steps.tag.outputs.new_tag }}
        run: |
          set -euo pipefail
          git tag -a "${NEW_TAG}" -m "Release ${NEW_TAG}"
          git push origin "${NEW_TAG}"

      - name: Summary
        run: |
          {
            echo "## Tag created"
            echo "- Previous tag: \`${{ steps.tag.outputs.latest_tag }}\`"
            echo "- New tag: \`${{ steps.tag.outputs.new_tag }}\`"
            echo ""
            echo "Release workflow will run in the next job."
          } >> "${GITHUB_STEP_SUMMARY}"

  release:
    name: Build and publish release
    needs: create-tag
    uses: ./.github/workflows/release.yml
    with:
      release_tag: ${{ needs.create-tag.outputs.new_tag }}
